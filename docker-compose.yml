services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: simple_agent_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_agent_chat"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.docker
    ports:
      - "5178:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
